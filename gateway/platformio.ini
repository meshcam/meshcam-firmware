; Trail-cam GATEWAY — LoRa/RNS in, network + HTTPS out. No laptop in the data path.
;
;   leaf --915MHz RNS Resource--> THIS BOARD --WiFi or ethernet + HTTPS--> trailcam ingest
;
; Two board families, one firmware (src/main.cpp):
;   heltec-v3-*  — Heltec WiFi LoRa 32 V3: onboard SX1262 + OLED, WiFi uplink.
;   poe-*        — LILYGO T-Internet-POE: LAN8720 wired ethernet (onboard 802.3af PoE PD),
;                  hand-wired SX1262 (Waveshare Core1262) on the free GPIOs, no screen.
;                  Also exposes RNS-over-UDP on the wire (port 4242) for Python RNS peers.
;                  Boots fine with the radio absent (network-only) — wire it, reboot, done.
;
; Grown out of gate-a-resource's server role once Gate A passed (2026-07-03): same
; pinned microReticulum + vendored LoRaInterface + deadlock patch, plus a PERSISTENT
; NVS identity (so the destination hash baked into leaves NEVER rotates — reflash this
; board freely), network uplink, and a multipart POST per the docs/trailcam/ingest-api.md
; contract for every Resource that completes.
;
; Secrets + site-specific values (WiFi psk, ingest URL/token) live in secrets.ini
; (gitignored) — copy secrets.ini.example and fill it in. Build fails loudly if missing.

[platformio]
extra_configs = secrets.ini

[env]
monitor_speed = 115200
upload_speed  = 460800
build_type    = debug
extra_scripts = pre:patch_microreticulum.py
build_flags =
	-Wall
	-Wno-missing-field-initializers
	-Wno-format
	-DRNS_USE_FS
	; RAM hashlist (2026-07-19): the persistent replay-guard store did TWO synchronous
	; flash writes per accepted packet INSIDE radio dispatch — latency stacked exactly
	; where contention losses live (and the leaf shares that LittleFS with the photo
	; ring; its compaction threw "Has open FD" unlink errors). Wear was fine (~century);
	; the fsyncs were not. Cost of RAM-only: a reboot forgets the replay window, so a
	; stale announce can reprocess ONCE post-boot — benign, handlers are idempotent.
	-DRNS_PERSIST_HASHLIST=0
	-DUSTORE_USE_UNIVERSALFS
	; compile-in DEBUG-capable RNS logging; runtime level set in main.cpp
	-DRNS_LOG_LEVEL=7
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	jgromes/RadioLib @ ^7.0.0
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	; pinned to the SHA Gate A validated on hardware
	https://github.com/attermann/microReticulum.git#c02b6e3d985567cced4450fb65902106ebda5a39

; Everything shared by every gateway EXCEPT the board and the site slug. The slug is
; the only per-instance difference (the display address is fetched from the backend by
; slug); GW_INGEST_URL/TOKEN come from secrets.ini.
[gateway_common]
flags =
	${env.build_flags}
	-Wextra
	-DMCU_ESP32
	-DMSGPACK_USE_BOOST=OFF
	; Gateways are mains/PoE powered — there is no battery reason to be quiet, and the
	; LoRaInterface.h default of 10 dBm is a DESK-BENCH setting (it exists so two radios
	; a metre apart don't saturate each other). Shipping it to the field left the gateway
	; whispering back at 10 dBm while the surveyor shouted at 20: a ~17 dB measured
	; asymmetry in which the DOWNLINK is the weak half, so the probe_ack is the first
	; thing to drop at range and the sender then records a FALSE failure (probe #27,
	; 2026-07-14 — gateway logged all 5308 bytes, the board logged ok=0, and the range
	; walk came home with a false negative). Match the surveyor at 20 dBm. SX1262 could do 22; 20 keeps the link
	; symmetric, which is what makes the ok flag mean something.
	-DLORA_TX_DBM=20
	${secrets.build_flags}

[heltec_common]
flags =
	${gateway_common.flags}
	-DBOARD_HELTEC_V3
	-DGW_HAS_OLED
	-DUSTORE_ENABLE_LOG

; ---------------- Heltec V3 (WiFi) ------------------------------------------------------

; Second gateway (board #2, dest 5b8cd66a...). site=<your-site>.
[env:heltec-v3-gateway]
framework             = arduino
platform              = espressif32
board                 = heltec_wifi_lora_32_V3
board_build.partitions = partitions_ota_8mb.csv
monitor_filters       = esp32_exception_decoder
build_flags =
	${heltec_common.flags}
	'-DGW_SITE="site2"'
lib_deps =
	${env.lib_deps}
	olikraus/U8g2@^2.36.5

; HOME gateway (board #1, dest b78747ea...). Same firmware, site=home.
[env:heltec-v3-gateway-home]
extends     = env:heltec-v3-gateway
build_flags =
	${heltec_common.flags}
	'-DGW_SITE="home"'

; Network/OTA update targets. Same firmware; only the upload path changes. Pass the
; device IP on the CLI (over the WG tunnel):
;   pio run -e heltec-v3-gateway-ota      -t upload --upload-port <gateway-ip>
;   pio run -e heltec-v3-gateway-home-ota -t upload --upload-port <home-ip>
[env:heltec-v3-gateway-ota]
extends         = env:heltec-v3-gateway
upload_protocol = espota
upload_flags    = --auth=${secrets.ota_auth}

[env:heltec-v3-gateway-home-ota]
extends         = env:heltec-v3-gateway-home
upload_protocol = espota
upload_flags    = --auth=${secrets.ota_auth}

; ---------------- LILYGO T-Internet-POE (wired ethernet + PoE) --------------------------
;
; ESP32-WROOM (4MB flash) + LAN8720. Pinned to espressif32@6.x (Arduino core 2.0.x) on
; purpose: main.cpp uses the classic ETH.begin(addr,power,mdc,mdio,type,clk) signature
; (core 3.x changed the ETH API) — same pin map bridge-poe bench-proved 2026-06-30.
;
; SX1262 (Waveshare Core1262-HF) hand-wired per docs/trailcam/hardware.md (verified
; against the v1.0 schematic 2026-07-04): the RMII PHY owns 19/21/22/25/26/27 + MDC 23 /
; MDIO 18 + clock-out 17 + PHY reset 5, so the radio gets the free header pins below.
; 34/35/36 are input-only — fine for BUSY/MISO/DIO1 (all MCU inputs). DIO2 is the RF
; switch, DIO3 feeds the 1.8V TCXO (the GATE_B_WIRED_SX1262 board case handles both).
; First flash is USB via the LilyGo downloader board; after that, espota over ethernet.
[poe_common]
flags =
	${gateway_common.flags}
	-DGW_NET_ETH
	-DGATE_B_WIRED_SX1262
	-DRADIO_SCLK_PIN=33
	-DRADIO_MISO_PIN=35
	-DRADIO_MOSI_PIN=32
	-DRADIO_CS_PIN=4
	-DRADIO_RST_PIN=16
	-DRADIO_BUSY_PIN=34
	-DRADIO_DIO1_PIN=36
	-DDEFAULT_UDP_PORT=4242

; PoE gateway on the bench / at home. site=home (replaces heltec board #1).
[env:poe-gateway-home]
framework             = arduino
platform              = espressif32@6.9.0
board                 = esp32dev
board_build.partitions = partitions_ota_4mb.csv
monitor_filters       = esp32_exception_decoder
build_flags =
	${poe_common.flags}
	'-DGW_SITE="home"'

; PoE gateway for the remote-site tower (site2). Same firmware, different slug.
[env:poe-gateway]
extends     = env:poe-gateway-home
build_flags =
	${poe_common.flags}
	'-DGW_SITE="site2"'

;   pio run -e poe-gateway-home-ota -t upload --upload-port <board-ip>
[env:poe-gateway-home-ota]
extends         = env:poe-gateway-home
upload_protocol = espota
upload_flags    = --auth=${secrets.ota_auth}

[env:poe-gateway-ota]
extends         = env:poe-gateway
upload_protocol = espota
upload_flags    = --auth=${secrets.ota_auth}
