; Trail-cam GATEWAY — Heltec V3: LoRa/RNS in, WiFi/HTTPS out. No laptop in the data path.
;
;   leaf --915MHz RNS Resource--> THIS BOARD --WiFi (your-wifi) + HTTPS--> trailcam ingest
;
; Grown out of gate-a-resource's server role once Gate A passed (2026-07-03): same
; pinned microReticulum + vendored LoRaInterface + deadlock patch, plus a PERSISTENT
; NVS identity (so the destination hash baked into leaves NEVER rotates — reflash this
; board freely), WiFi uplink, and a multipart POST per the docs/trailcam/ingest-api.md
; contract for every Resource that completes.
;
; Secrets (WiFi psk, ingest token) live in secrets.ini (gitignored) — copy
; secrets.ini.example and fill it in. Build fails loudly if it's missing.

[platformio]
extra_configs = secrets.ini

[env]
monitor_speed = 115200
upload_speed  = 460800
build_type    = debug
extra_scripts = pre:patch_microreticulum.py
build_flags =
	-Wall
	-Wno-missing-field-initializers
	-Wno-format
	-DRNS_USE_FS
	-DUSTORE_USE_UNIVERSALFS
	; compile-in DEBUG-capable RNS logging; runtime level set in main.cpp
	-DRNS_LOG_LEVEL=7
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	jgromes/RadioLib @ ^7.0.0
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	; pinned to the SHA Gate A validated on hardware
	https://github.com/attermann/microReticulum.git#c02b6e3d985567cced4450fb65902106ebda5a39

; Everything shared by both gateways EXCEPT the site slug. The slug is the only
; per-instance difference (the OLED address is fetched from the backend by slug).
[gateway_common]
flags =
	${env.build_flags}
	-Wextra
	-DMCU_ESP32
	-DBOARD_HELTEC_V3
	-DMSGPACK_USE_BOOST=OFF
	'-DGW_DEFAULT_CAMERA="c3-back-of-lake"'
	'-DGW_INGEST_URL="https://trailcam.example.com/api/v1/ingest"'
	${secrets.build_flags}

; Second gateway (board #2, dest 5b8cd66a...). site=<your-site>.
[env:heltec-v3-gateway]
framework             = arduino
platform              = espressif32
board                 = heltec_wifi_lora_32_V3
board_build.partitions = partitions_ota_8mb.csv
monitor_filters       = esp32_exception_decoder
build_flags =
	${gateway_common.flags}
	'-DGW_SITE="site2"'
lib_deps =
	${env.lib_deps}
	olikraus/U8g2@^2.36.5

; HOME gateway (board #1, dest b78747ea...). Same firmware, site=home.
[env:heltec-v3-gateway-home]
extends     = env:heltec-v3-gateway
build_flags =
	${gateway_common.flags}
	'-DGW_SITE="home"'

; WiFi/OTA update targets. Same firmware; only the upload path changes. Pass the
; device IP on the CLI (over the WG tunnel):
;   pio run -e heltec-v3-gateway-ota      -t upload --upload-port <gateway-ip>
;   pio run -e heltec-v3-gateway-home-ota -t upload --upload-port <home-ip>
[env:heltec-v3-gateway-ota]
extends         = env:heltec-v3-gateway
upload_protocol = espota
upload_flags    = --auth=${secrets.ota_auth}

[env:heltec-v3-gateway-home-ota]
extends         = env:heltec-v3-gateway-home
upload_protocol = espota
upload_flags    = --auth=${secrets.ota_auth}
