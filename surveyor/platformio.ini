; Trail-cam SURVEYOR — the handheld RNS probe (docs/trailcam/surveyor.md).
;
; LILYGO T-Beam V1.2 915 (classic ESP32 + SX1276 + AXP PMU + u-blox 6 GPS + SSD1306).
; Walk into any meshcam mesh, power on, press the button: a dummy probe rides the REAL
; stack (microReticulum Resource -> gateway) and both ends log a GPS-stamped
; proof-of-connection. See src/main.cpp for button/serial UX.
;
;   pio run -e tbeam -t upload
;   pio device monitor -b 115200
;
; Radio variant confirmed SX1276 (factory boot log, 2026-07-10) — pins are the
; BOARD_TBEAM block in lib/lora_interface/LoRaInterface.cpp.

[env:tbeam]
platform = espressif32
board = ttgo-t-beam
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; 4 MB flash: 3 MB app (no OTA — surveyor is USB-flashed), ~0.9 MB LittleFS for the
; RNS stores + the probe CSV.
board_build.partitions = huge_app.csv
board_build.filesystem = littlefs
; Same microReticulum single-thread deadlock patch as the leaf/gateway (Gate A finding).
extra_scripts = pre:patch_microreticulum.py
build_flags =
	-Wall
	-Wno-format
	-DRNS_USE_FS
	; RAM hashlist (2026-07-19): the persistent replay-guard store did TWO synchronous
	; flash writes per accepted packet INSIDE radio dispatch — latency stacked exactly
	; where contention losses live (and the leaf shares that LittleFS with the photo
	; ring; its compaction threw "Has open FD" unlink errors). Wear was fine (~century);
	; the fsyncs were not. Cost of RAM-only: a reboot forgets the replay window, so a
	; stale announce can reprocess ONCE post-boot — benign, handlers are idempotent.
	-DRNS_PERSIST_HASHLIST=0
	-DUSTORE_USE_UNIVERSALFS
	-DMCU_ESP32
	-DMSGPACK_USE_BOOST=OFF
	-DBOARD_TBEAM
	; Field instrument: max continuous-safe PA_BOOST. The deployed Core1262 leaves run
	; 22 dBm, so surveyor readings are ~2 dB conservative (the right direction).
	-DLORA_TX_DBM=20
	'-DSURVEYOR_SLUG="surveyor-1"'
	; Every known mesh's gateway destination hash (NVS-persistent per gateway board, so
	; these never rotate): home bench heltec, then the north40 T-Internet-POE tower
	; node. The surveyor picks the mesh AT RUNTIME — path-requests the candidates
	; round-robin (only the mesh it's standing in answers), adopts any overheard
	; gateway announce, and remembers the last winner in NVS. One image, every mesh.
	'-DSURVEYOR_GATEWAY_CANDIDATES="b78747eafb3e5c7ca7d4d0c20e09b9bf,8e2bddb9b0c3a909b28d54829959dbbe"'
lib_deps =
	MsgPack@^0.4.2
	jgromes/RadioLib @ ^7.0.0
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	; pinned to the SHA Gate A validated on hardware (Resource + deadlock patch proven)
	https://github.com/attermann/microReticulum.git#c02b6e3d985567cced4450fb65902106ebda5a39
	lewisxhe/XPowersLib@^0.2.6
	mikalhart/TinyGPSPlus@^1.0.3
	olikraus/U8g2@^2.35.19

; (per-site tbeam envs retired 2026-07-10: mesh selection moved to runtime discovery —
; add new meshes to SURVEYOR_GATEWAY_CANDIDATES above, or just let the surveyor
; overhear the new gateway's announce and adopt it with zero config.)
