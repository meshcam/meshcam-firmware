; PoE bridge (Step 1: ethernet-only) — LilyGo T-Internet-POE (ESP32-WROOM + LAN8720).
;
; Proves the UNPROVEN half of the wired gateway: does microReticulum's UDP interface run
; over WIRED ethernet (LAN8720) and link to reference Python RNS? No LoRa yet — the radio
; (Core1262) arrives Jul 8 and gets bolted on as Step 2 (the Gate A2 BRIDGE role).
;
;   pio run -e poe-endpoint -t upload   # flash via the LilyGo downloader board (USB)
;   pio device monitor -b 115200        # watch it link to the Pi/dev-host Python RNS
;
; Pinned to espressif32@6.x (Arduino-ESP32 core 2.0.x) on purpose: the classic
; ETH.begin(addr,power,mdc,mdio,type,clk_mode) signature the T-Internet-POE examples use.
; Core 3.x changed the ETH API; don't unpin without updating eth_up() in main.cpp.

[env:poe-endpoint]
platform       = espressif32@6.9.0
board          = esp32dev                 ; T-Internet-POE = ESP32-WROOM-32
framework      = arduino
; OTA-capable layout: two ~1.9MB app slots + otadata so the board can write a new
; image over the network while running the old one. (no_ota.csv = single app, can't OTA.)
; The app is ~1.31MB, which fits min_spiffs' 1.875MB slots; default.csv's 1.25MB would not.
board_build.partitions = min_spiffs.csv
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder
build_type     = debug
build_flags =
	-Wall
	-Wno-format
	-DRNS_USE_FS
	-DUSTORE_USE_UNIVERSALFS
	-DMCU_ESP32
	-DMSGPACK_USE_BOOST=OFF
	; --- UDP interface addressing (vendored lib/udp_interface) ---
	; Broadcast on the local L2 is the default (proven to reach the peer on 2026-07-01 —
	; board + dev host share the your LAN segment segment). If the peer is on a different L2,
	; set the peer's IP directly: -DDEFAULT_UDP_REMOTE_HOST='"<peer-ip>"' and point the
	; peer's forward_ip back at the board (both worked in the interop test).
	-DDEFAULT_UDP_PORT=4242
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	https://github.com/attermann/microReticulum.git#c02b6e3d985567cced4450fb65902106ebda5a39
	; NOTE: no RadioLib / LoRaInterface yet — this step is ethernet-only.
	; UDPInterface is vendored in lib/udp_interface/ (patched: ethernet, not WiFi).

; --- OTA (after the first USB flash bootstraps this OTA-capable build) ---------------
; The firmware runs an ArduinoOTA listener (port 3232). Subsequent updates go over the
; network — no downloader — incl. over a WireGuard tunnel to the remote-site bridge.
; VALIDATED 2026-06-30 over wired ethernet (espota -> a PoE-only board, no USB):
;   ESPOTA=$(find ~/.platformio/packages/framework-arduinoespressif32 -name espota.py)
;   ~/.pio-venv/bin/python "$ESPOTA" -i <board-ip> -p 3232 -f .pio/build/poe-endpoint/firmware.bin -r
; (`pio run -t upload --upload-protocol espota` does NOT exist as a CLI flag; call espota.py
;  directly, or set upload_protocol=espota + upload_port=<ip> in this env.) espota targets a
; fixed IP so no mDNS is needed — works to a remote board over a VPN tunnel.
; First flash MUST be USB (this layout + the OTA listener don't exist on the board yet).
