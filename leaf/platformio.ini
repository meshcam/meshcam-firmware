; Trail-cam LEAF — deep-sleep + PIR ext0 + timer wake, real camera capture, an INT8 TFLite
; false-trigger detector, and the persistent-identity RNS radio stack over a bare SX1262.
;
;   pio run -e freenove-s3        -t upload    # bench: 20 s test timer + camera + detector(gated) + radio
;   pio run -e freenove-s3-field  -t upload    # adaptive schedule; detector logs only (no gate)
;   pio run -e pin-monitor        -t upload    # lean diagnostic: characterize GPIO21, no radio/detector
;   pio device monitor -b 460800
;
; Wave a hand -> "cause=PIR (ext0)" -> capture -> detector (person=NN) -> (gated) send.
; Radio envs also bring up the SX1262 and print the STABLE leaf destination hash. OTA needs
; the 915 antenna. See README for the layer-by-layer hardware-validation log.

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi     ; match the leaf board (WROOM-1 N16R8)
board_upload.flash_size = 16MB
board_build.partitions = partitions_leaf.csv   ; 3MB app + ~12.9MB LittleFS full-res store
monitor_speed = 460800                          ; QXGA fulls must beat the bridge's 30s frame window
; Patch microReticulum's Transport::outbound/inbound single-thread deadlock in libdeps
; before each build (idempotent; no-op for the non-radio diagnostic envs). Found in Gate A
; (2026-07-02): ANY Resource retry re-enters outbound() from inside jobs() and the literal
; Python-lock translation spins forever. The leaf pushes thumbnails as Resources -> without
; this, one lost part wedges the leaf until power-cycle (no serial, no WDT: silent death).
extra_scripts = pre:patch_microreticulum.py
monitor_filters = esp32_exception_decoder
build_flags =
	-Wall
	-DBOARD_HAS_PSRAM
	-DLEAF_PIR_GPIO=21

; --- radio stack (SX1262 + microReticulum) — referenced by the field-capable envs -------
; LEAF_RADIO gates leaf_radio.* + the LoRaInterface (lib/). Pins match the leaf GPIO budget
; (docs) and the gate-b radio map.
[radio]
build_flags =
	-Wno-format
	-DRNS_USE_FS
	-DUSTORE_USE_UNIVERSALFS
	-DMCU_ESP32
	-DMSGPACK_USE_BOOST=OFF
	-DLEAF_RADIO
	-DGATE_B_WIRED_SX1262
	; MISO is per-env: bench Freenove = 41 (its SD slot owns 38/39/40); custom
	; PCB = 38 (dedicated SD CS on 43, BME280 on its own I2C 40/41).
	-DRADIO_SCLK_PIN=47 -DRADIO_MOSI_PIN=48
	-DRADIO_CS_PIN=14 -DRADIO_RST_PIN=1 -DRADIO_BUSY_PIN=2 -DRADIO_DIO1_PIN=42
	; The gateway (gateway-heltec) destination hash the alert thumbnail is pushed to as
	; an RNS::Resource. The gateway's identity is NVS-persistent (2026-07-03) so this
	; hash NEVER rotates — reflash the gateway freely. Empty/absent = announce-only.
	'-DLEAF_GATEWAY_DEST_HEX="b78747eafb3e5c7ca7d4d0c20e09b9bf"'
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	jgromes/RadioLib @ ^7.0.0
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	; pinned to the SHA Gate A validated on hardware (Resource + deadlock patch proven)
	https://github.com/attermann/microReticulum.git#c02b6e3d985567cced4450fb65902106ebda5a39

; --- detector (INT8 TFLite-micro person_detection) — the false-trigger filter -----------
; LEAF_DETECTOR gates the leaf_detector lib (in lib/, model vendored there) + its calls.
; tflm_esp32 is the ESP-NN-accelerated TFLite-micro runtime. LEAF_DETECT_GATE (bench only)
; makes a "no subject" verdict actually SKIP the send so the model is visibly working; leave
; it unset in the field until a multi-class deer/person model replaces person-only.
[detector]
build_flags =
	-DLEAF_DETECTOR
lib_deps =
	eloquentarduino/tflm_esp32@^2.0.0

[env:freenove-s3]
build_flags =
	${env.build_flags}
	${radio.build_flags}
	-DRADIO_MISO_PIN=41
	${detector.build_flags}
	; NO LEAF_DETECT_GATE (removed 2026-07-03): the person model returned "no subject"
	; on a real walk-by (send=0) and silently ate the alert — the exact failure the field
	; env's comment predicted. Score stays as metadata; gating waits for a model that's
	; proven against real captures.
	-DLEAF_TEST_INTERVAL_S=20     ; short timer so bench wakes are watchable
	; bench, CARDLESS-fallback ring only (with an SD card there's no eviction at all):
	; desk motion fires a capture every ~25 s; at QXGA ~130 KB/full, 64 slots (~8.5 MB of
	; the 12.9 MB partition) give ~25 min of retention so a photo survives long enough to
	; 📡-request. The conservative default (4) stays for the field env.
	-DLEAF_STORE_MAX_FULL=64
	; NOTE: there is deliberately NO "live capture fallback" for fetch_full of an
	; unstored event — a full-res from a different moment corrupts the photo record
	; (verified bug 2026-07-02, dev photo 93487506). Missing = ignore, expires server-side.
lib_deps =
	${radio.lib_deps}
	${detector.lib_deps}

[env:freenove-s3-field]
build_flags =
	${env.build_flags}
	${radio.build_flags}
	-DRADIO_MISO_PIN=41
	${detector.build_flags}
	; no LEAF_DETECT_GATE -> detector logs the score but never suppresses (safe for animals)
	; no LEAF_TEST_INTERVAL_S -> real adaptive schedule (needs gateway time sync)
lib_deps =
	${radio.lib_deps}
	${detector.lib_deps}

; Diagnostic only: characterize the PIR line on GPIO21. No sleep, no camera, no radio, no
; detector (stays lean).
[env:pin-monitor]
lib_ignore = lora_interface, leaf_detector
build_flags =
	${env.build_flags}
	-DLEAF_PIN_MONITOR

; Diagnostic only: isolate the microSD (mount/write/read loop, no sleep/camera/radio).
[env:sd-probe]
lib_ignore = lora_interface, leaf_detector
build_flags =
	${env.build_flags}
	-DLEAF_SD_PROBE

; --- custom leaf PCB (pilot, v0.5.x, JLC fab v6) -----------------------------------------
; Console is the S3's NATIVE USB (no UART bridge on the board): CDC flags below. Switched
; power rails (leaf_rails.h): IO39 camera, IO44 radio+microSD — firmware drives them LOW to
; power, and the board's pull-ups hold them OFF through deep sleep. SD is SPI mode CS=43 on
; the shared radio bus. BME280 module in J10 (I2C 40/41 @0x76). Battery divider on IO3.
; Radio = socketed Core1262 (same TCXO/profile as bench). Deep-sleep target: <50 uA.
[env:leaf-pcb]
build_flags =
	${env.build_flags}
	${radio.build_flags}
	${detector.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DRADIO_MISO_PIN=38
	-DLEAF_CAM_PWR_GPIO=39
	-DLEAF_RADIO_PWR_GPIO=44
	-DLEAF_SD_SPI_CS=43
	-DLEAF_VBAT_ADC_GPIO=3
	-DLEAF_BME280
	-DLEAF_TEST_INTERVAL_S=20
	-DLEAF_STORE_MAX_FULL=64
lib_deps =
	${radio.lib_deps}
	${detector.lib_deps}
	adafruit/Adafruit BME280 Library@^2.2.4

[env:leaf-pcb-field]
build_flags =
	${env.build_flags}
	${radio.build_flags}
	${detector.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DRADIO_MISO_PIN=38
	-DLEAF_CAM_PWR_GPIO=39
	-DLEAF_RADIO_PWR_GPIO=44
	-DLEAF_SD_SPI_CS=43
	-DLEAF_VBAT_ADC_GPIO=3
	-DLEAF_BME280
lib_deps =
	${radio.lib_deps}
	${detector.lib_deps}
	adafruit/Adafruit BME280 Library@^2.2.4
