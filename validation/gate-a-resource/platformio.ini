; Gate A — microReticulum Resource transfer over LoRa, two Heltec V3s.
; Lifted from microReticulum/examples/lora_transport/platformio.ini (which already
; ships a tested heltec_wifi_lora_32_V3 target), trimmed to the two roles we need.
;
; Build/flash BOTH boards from this one project:
;   pio run -e heltec-v3-server -t upload --upload-port /dev/ttyACM0   # the receiver/gateway
;   pio run -e heltec-v3-client -t upload --upload-port /dev/ttyACM1   # the sender/leaf
;
; Roles are a compile-time flag (-DGATE_A_SERVER / -DGATE_A_CLIENT); same src/main.cpp.

[env]
monitor_speed = 115200
upload_speed  = 460800
build_type    = debug
; Patch microReticulum's Transport::outbound/inbound single-thread deadlock in
; libdeps before each build (idempotent) — see patch_microreticulum.py for the
; full story. Without it, the FIRST Resource retry wedges the firmware solid.
extra_scripts = pre:patch_microreticulum.py
build_flags =
	-Wall
	-Wno-missing-field-initializers
	-Wno-format
	-DRNS_USE_FS
	-DUSTORE_USE_UNIVERSALFS
	; compile-in DEBUG-level RNS logging (default cap is VERBOSE); runtime level is
	; still set by RNS::loglevel() in main.cpp — bench diagnosis needs packet-path logs
	-DRNS_LOG_LEVEL=7
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	jgromes/RadioLib @ ^7.0.0
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	; microReticulum pinned to the SHA the vendored LoRaInterface was taken from.
	https://github.com/attermann/microReticulum.git#c02b6e3d985567cced4450fb65902106ebda5a39
	; LoRaInterface is vendored in lib/lora_interface/ (it's not a standalone library;
	; it lives inside the microReticulum repo and PlatformIO can't pull a git subfolder).
	; PlatformIO's LDF auto-discovers it from lib/.

[common-heltec-v3]
framework             = arduino
platform              = espressif32
board                 = heltec_wifi_lora_32_V3
board_build.partitions = no_ota.csv
monitor_filters       = esp32_exception_decoder
build_flags =
	${env.build_flags}
	-Wextra
	-DMCU_ESP32
	-DBOARD_HELTEC_V3
	-DMSGPACK_USE_BOOST=OFF
lib_deps = ${env.lib_deps}

[env:heltec-v3-server]
extends     = common-heltec-v3
build_flags = ${common-heltec-v3.build_flags} -DGATE_A_SERVER

[env:heltec-v3-client]
extends     = common-heltec-v3
build_flags = ${common-heltec-v3.build_flags} -DGATE_A_CLIENT
