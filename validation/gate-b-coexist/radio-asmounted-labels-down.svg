<text x="172" y="160" fill="#333" font-size="12" text-anchor="end">POWER row</text>
<text x="172" y="390" fill="#333" font-size="12" text-anchor="end">SIGNAL row</text>
<text x="40" y="480" fill="#b00" font-size="14" font-weight="700">BEFORE powering — 1-minute multimeter check (catches a flipped orientation):</text>
<text x="40" y="504" fill="#333" font-size="13">Continuity/beep from a GND pad to the module’s metal shield = YES (shield is ground).  From 3V3 to shield = NO.</text>
<text x="40" y="524" fill="#333" font-size="13">If that’s reversed, the module is flipped the other way — tell me and I’ll relabel. This is the one worth verifying.</text>
