<svg xmlns="http://www.w3.org/2000/svg" width="11in" height="8.5in" viewBox="0 0 1100 850" font-family="Arial,Helvetica,sans-serif">
<rect width="1100" height="850" fill="#fff"/>
<text x="40" y="42" fill="#111" font-size="24" font-weight="700">Trail-cam leaf — wire connection list</text>
<text x="40" y="66" fill="#555" font-size="13">One wire per row. From a Freenove pin -&gt; to a radio pad. The perfboard grid does not matter — just position the boards and connect these.</text>
<text x="40" y="110" fill="#111" font-size="16" font-weight="700">RADIO  (page 1 — build + test FIRST)</text>
<rect x="40" y="145" width="16" height="16" fill="#e3a600" rx="2"/>
<text x="66" y="158" fill="#111" font-size="14" font-weight="700">SCK  (47)</text>
<text x="190" y="158" fill="#111" font-size="14">-&gt;  CLK</text>
<rect x="380" y="145" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="177" width="16" height="16" fill="#2ca02c" rx="2"/>
<text x="66" y="190" fill="#111" font-size="14" font-weight="700">MOSI (48)</text>
<text x="190" y="190" fill="#111" font-size="14">-&gt;  MOSI</text>
<rect x="380" y="177" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="209" width="16" height="16" fill="#1f6fdb" rx="2"/>
<text x="66" y="222" fill="#111" font-size="14" font-weight="700">MISO (38)</text>
<text x="190" y="222" fill="#111" font-size="14">-&gt;  MISO</text>
<rect x="380" y="209" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="241" width="16" height="16" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="48" y="253" font-size="10" fill="#666" text-anchor="middle">W</text>
<text x="66" y="254" fill="#111" font-size="14" font-weight="700">NSS  (14)</text>
<text x="190" y="254" fill="#111" font-size="14">-&gt;  CS</text>
<rect x="380" y="241" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="273" width="16" height="16" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="48" y="285" font-size="10" fill="#666" text-anchor="middle">W</text>
<text x="66" y="286" fill="#111" font-size="14" font-weight="700">RST  (1)</text>
<text x="190" y="286" fill="#111" font-size="14">-&gt;  RESET</text>
<rect x="380" y="273" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="305" width="16" height="16" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="48" y="317" font-size="10" fill="#666" text-anchor="middle">W</text>
<text x="66" y="318" fill="#111" font-size="14" font-weight="700">BUSY (2)</text>
<text x="190" y="318" fill="#111" font-size="14">-&gt;  BUSY</text>
<rect x="380" y="305" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="337" width="16" height="16" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="48" y="349" font-size="10" fill="#666" text-anchor="middle">W</text>
<text x="66" y="350" fill="#111" font-size="14" font-weight="700">DIO1 (42)</text>
<text x="190" y="350" fill="#111" font-size="14">-&gt;  DIO1</text>
<rect x="380" y="337" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="369" width="16" height="16" fill="#d62728" rx="2"/>
<text x="66" y="382" fill="#111" font-size="14" font-weight="700">3V3</text>
<text x="190" y="382" fill="#111" font-size="14">-&gt;  SX1262 3V3 pad</text>
<rect x="380" y="369" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="401" width="16" height="16" fill="#111111" rx="2"/>
<text x="66" y="414" fill="#111" font-size="14" font-weight="700">GND</text>
<text x="190" y="414" fill="#111" font-size="14">-&gt;  SX1262 GND pad</text>
<rect x="380" y="401" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<text x="40" y="456" fill="#111" font-size="16" font-weight="700">SENSORS  (page 2 — add for deployment)</text>
<text x="40" y="480" fill="#7b2f8f" font-size="13" font-weight="700">PIR AM312</text>
<rect x="40" y="499" width="16" height="16" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="48" y="511" font-size="10" fill="#666" text-anchor="middle">W</text>
<text x="66" y="512" fill="#111" font-size="14" font-weight="700">OUT</text>
<text x="190" y="512" fill="#111" font-size="14">-&gt;  GPIO21</text>
<rect x="380" y="499" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="529" width="16" height="16" fill="#d62728" rx="2"/>
<text x="66" y="542" fill="#111" font-size="14" font-weight="700">VCC</text>
<text x="190" y="542" fill="#111" font-size="14">-&gt;  3V3 (daisy-chain)</text>
<rect x="380" y="529" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="559" width="16" height="16" fill="#111111" rx="2"/>
<text x="66" y="572" fill="#111" font-size="14" font-weight="700">GND</text>
<text x="190" y="572" fill="#111" font-size="14">-&gt;  GND (daisy-chain)</text>
<rect x="380" y="559" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<text x="40" y="612" fill="#1f6fdb" font-size="13" font-weight="700">BME280 (I2C)</text>
<rect x="40" y="631" width="16" height="16" fill="#2ca02c" rx="2"/>
<text x="66" y="644" fill="#111" font-size="14" font-weight="700">SDA</text>
<text x="190" y="644" fill="#111" font-size="14">-&gt;  GPIO40</text>
<rect x="380" y="631" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="661" width="16" height="16" fill="#e3a600" rx="2"/>
<text x="66" y="674" fill="#111" font-size="14" font-weight="700">SCL</text>
<text x="190" y="674" fill="#111" font-size="14">-&gt;  GPIO41</text>
<rect x="380" y="661" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="691" width="16" height="16" fill="#d62728" rx="2"/>
<text x="66" y="704" fill="#111" font-size="14" font-weight="700">VCC</text>
<text x="190" y="704" fill="#111" font-size="14">-&gt;  3V3 (daisy-chain)</text>
<rect x="380" y="691" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<rect x="40" y="721" width="16" height="16" fill="#111111" rx="2"/>
<text x="66" y="734" fill="#111" font-size="14" font-weight="700">GND</text>
<text x="190" y="734" fill="#111" font-size="14">-&gt;  GND (daisy-chain)</text>
<rect x="380" y="721" width="15" height="15" fill="#fff" stroke="#888" stroke-width="1.3"/>
<text x="560" y="110" fill="#111" font-size="16" font-weight="700">Wire colors (6 you have)</text>
<rect x="560" y="135" width="16" height="16" fill="#d62728" rx="2"/>
<text x="586" y="148" fill="#111" font-size="13" font-weight="700">Red</text>
<text x="670" y="148" fill="#333" font-size="13">all 3V3 / VCC</text>
<rect x="560" y="165" width="16" height="16" fill="#111111" rx="2"/>
<text x="586" y="178" fill="#111" font-size="13" font-weight="700">Black</text>
<text x="670" y="178" fill="#333" font-size="13">all GND</text>
<rect x="560" y="195" width="16" height="16" fill="#e3a600" rx="2"/>
<text x="586" y="208" fill="#111" font-size="13" font-weight="700">Yellow</text>
<text x="670" y="208" fill="#333" font-size="13">clocks: SCK, SCL</text>
<rect x="560" y="225" width="16" height="16" fill="#2ca02c" rx="2"/>
<text x="586" y="238" fill="#111" font-size="13" font-weight="700">Green</text>
<text x="670" y="238" fill="#333" font-size="13">data out: MOSI, SDA</text>
<rect x="560" y="255" width="16" height="16" fill="#1f6fdb" rx="2"/>
<text x="586" y="268" fill="#111" font-size="13" font-weight="700">Blue</text>
<text x="670" y="268" fill="#333" font-size="13">MISO</text>
<rect x="560" y="285" width="16" height="16" fill="#fff" stroke="#999" stroke-width="1.5"/>
<text x="568" y="297" font-size="10" fill="#666" text-anchor="middle">W</text>
<text x="586" y="298" fill="#111" font-size="13" font-weight="700">White</text>
<text x="670" y="298" fill="#333" font-size="13">control: NSS,RST,BUSY,DIO1,PIR OUT</text>
<text x="560" y="346" fill="#111" font-size="16" font-weight="700">Power — this board has no rails</text>
<text x="560" y="370" fill="#333" font-size="13">Freenove has ONE 3V3 pin and ONE GND pin.</text>
<text x="560" y="394" fill="#333" font-size="13">Radio test = just 2 power wires:</text>
<text x="560" y="418" fill="#333" font-size="13">  Freenove 3V3 -> radio 3V3 pad,</text>
<text x="560" y="442" fill="#333" font-size="13">  Freenove GND -> radio GND pad.</text>
<text x="560" y="466" fill="#333" font-size="13">Sensors later = daisy-chain the power:</text>
<text x="560" y="490" fill="#333" font-size="13">  hop 3V3 from radio -> PIR -> BME280,</text>
<text x="560" y="514" fill="#333" font-size="13">  and GND the same way. No rail needed.</text>
<text x="560" y="558" fill="#111" font-size="16" font-weight="700">Placement (no coordinates needed)</text>
<text x="560" y="582" fill="#333" font-size="13">- Freenove plugs into 2 socket strips; radio</text>
<text x="560" y="606" fill="#333" font-size="13">  sits just below it on its own 2 strips.</text>
<text x="560" y="630" fill="#333" font-size="13">- TEST-FIT: push loose sockets onto the pins,</text>
<text x="560" y="654" fill="#333" font-size="13">  set the board on top, solder the sockets where</text>
<text x="560" y="678" fill="#333" font-size="13">  they land. The board's letters don't matter.</text>
<text x="560" y="702" fill="#333" font-size="13">- Keep SCK / BUSY / DIO1 (yellow + 2 white)</text>
<text x="560" y="726" fill="#333" font-size="13">  short — they're the flaky ones.</text>
</svg>