; Gate B — camera + RNS + TFLite arena coexistence on one ESP32-S3.
;
;   pio run -e freenove-s3   -t upload    # ESP32-S3-WROOM CAM (roomy GPIO, default)
;   pio run -e xiao-s3-sense -t upload    # Seeed XIAO ESP32S3 Sense (bare SX1262 wired)
;
; esp_camera.h ships with the arduino-esp32 core (no extra lib). The TFLite arena is a
; raw heap_caps_malloc in this skeleton, so esp-tflite-micro isn't pulled yet — add it
; when the real model goes in (commented below).

[env]
framework      = arduino
platform       = espressif32
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder
build_type     = debug
build_flags =
	-Wall
	-Wno-format
	-DBOARD_HAS_PSRAM
	-DRNS_USE_FS
	-DUSTORE_USE_UNIVERSALFS
	-DMCU_ESP32
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	jgromes/RadioLib @ ^7.0.0
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	https://github.com/attermann/microReticulum.git
	; LoRaInterface is vendored in lib/lora_interface/ with a GATE_B_WIRED_SX1262 board
	; case (its pins come from the RADIO_*_PIN build_flags below). Auto-discovered by LDF.
	; espressif/esp-tflite-micro      ; <- uncomment when swapping the stub for a real model

; RADIO_*_PIN: the bare SX1262 (Core1262) wiring. LoRaInterface compiles against these
; (it can't see src/gate_b_board.h from lib/), so they're authoritative here and MUST
; match the radio pin map in src/gate_b_board.h.

[env:freenove-s3]
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi      ; octal PSRAM (WROOM-1 N16R8)
board_upload.flash_size = 16MB
board_build.partitions  = huge_app.csv         ; big app, no OTA — camera+RNS+TFLite is large
build_flags =
	${env.build_flags}
	-DGATE_B_BOARD_FREENOVE_S3
	-DGATE_B_WIRED_SX1262
	; MISO on 38 (not 21): GPIO21 is reserved for the PIR ext0 deep-sleep wake
	; (RTC-domain 0-21 only); SPI routes to any pin via the S3 matrix. See the leaf
	; GPIO budget in docs/trailcam/hardware.md.
	-DRADIO_SCLK_PIN=47 -DRADIO_MOSI_PIN=48 -DRADIO_MISO_PIN=38
	-DRADIO_CS_PIN=14 -DRADIO_RST_PIN=1 -DRADIO_BUSY_PIN=2 -DRADIO_DIO1_PIN=42

; Camera + RAM only, NO radio. Flash THIS the day the Freenove arrives (Core1262 lands
; Jul 8). Proves the OV2640 + PSRAM + pin map on real silicon (first event prints the JPEG
; byte size) and the internal-SRAM coexistence verdict, without waiting on / needing the
; radio. Same build as freenove-s3 minus the SX1262 bring-up.
;   pio run -e freenove-s3-noradio -t upload
[env:freenove-s3-noradio]
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions  = huge_app.csv
build_flags =
	${env.build_flags}
	-DGATE_B_BOARD_FREENOVE_S3
	-DGATE_B_NO_RADIO
	; GATE_B_NO_RADIO stops the runtime SX1262 bring-up (main.cpp), but the vendored
	; LoRaInterface.cpp is still compiled by the LDF and needs a board branch, so keep
	; the WIRED_SX1262 define + pin map here — they're compile-time only.
	-DGATE_B_WIRED_SX1262
	-DRADIO_SCLK_PIN=47 -DRADIO_MOSI_PIN=48 -DRADIO_MISO_PIN=38
	-DRADIO_CS_PIN=14 -DRADIO_RST_PIN=1 -DRADIO_BUSY_PIN=2 -DRADIO_DIO1_PIN=42

[env:xiao-s3-sense]
board = seeed_xiao_esp32s3
board_build.arduino.memory_type = qio_opi      ; XIAO ESP32S3R8 = octal PSRAM
board_build.partitions  = huge_app.csv
build_flags =
	${env.build_flags}
	-DGATE_B_BOARD_XIAO_S3_SENSE
	-DGATE_B_WIRED_SX1262
	-DRADIO_SCLK_PIN=7 -DRADIO_MOSI_PIN=9 -DRADIO_MISO_PIN=8
	-DRADIO_CS_PIN=1 -DRADIO_RST_PIN=2 -DRADIO_BUSY_PIN=3 -DRADIO_DIO1_PIN=4
