; Gate A2 — microReticulum board that talks to a Pi over UDP (interop) and optionally
; bridges a LoRa mesh to it. Heltec V3 (ESP32-S3 + WiFi + SX1262).
;
;   pio run -e endpoint -t upload   # A2a: UDP-only, sends Resources to the Pi
;   pio run -e bridge   -t upload   # A2b: LoRa<->UDP transport node
;
; Vendor BOTH interfaces into lib/ from microReticulum/examples/common/:
;   lib/udp_interface/{UDPInterface.h,UDPInterface.cpp}     (Arduino path uses WiFiUdp)
;   lib/lora_interface/{LoRaInterface.h,LoRaInterface.cpp}  (bridge role only; Heltec V3 pins)

[env]
framework      = arduino
platform       = espressif32
board          = heltec_wifi_lora_32_V3
board_build.partitions = no_ota.csv
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder
build_flags =
	-Wall
	-Wno-format
	-DRNS_USE_FS
	-DUSTORE_USE_UNIVERSALFS
	-DMCU_ESP32
	-DBOARD_HELTEC_V3
	-DMSGPACK_USE_BOOST=OFF
lib_deps =
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	jgromes/RadioLib @ ^7.0.0
	https://github.com/attermann/Crypto.git
	https://github.com/attermann/microStore.git
	https://github.com/attermann/microReticulum.git

[env:endpoint]
build_flags = ${env.build_flags} -DA2_ROLE_ENDPOINT

[env:bridge]
build_flags = ${env.build_flags} -DA2_ROLE_BRIDGE
